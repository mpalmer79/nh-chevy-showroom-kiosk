name: CI/CD - Backend API

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  test_backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 🔄 Check Alembic Migrations
        run: |
          python -c "
          import importlib, os, sys
          sys.path.insert(0, '.')
          # Verify alembic config is importable
          import alembic.config
          print('Alembic config OK')
          # Verify migration scripts parse correctly
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          scripts = ScriptDirectory.from_config(cfg)
          revisions = list(scripts.walk_revisions())
          print(f'Found {len(revisions)} migration(s)')
          for rev in reversed(revisions):
              print(f'  {rev.revision}: {rev.doc}')
          # Verify migration chain is unbroken
          head = scripts.get_current_head()
          print(f'Head revision: {head}')
          print('Migration chain OK')
          "
        env:
          DATABASE_URL: sqlite:///test.db

      - name: 🧪 Run Tests with Coverage
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=70
        env:
          ENVIRONMENT: test
          ANTHROPIC_API_KEY: test-key-for-ci

      - name: ✅ Test Complete
        run: echo "Backend tests passed"
